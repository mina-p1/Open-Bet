name: Daily OpenBet ML Pipeline

# This schedules the script to run automatically
on:
  schedule:
    # Runs at 10:00 AM UTC (5:00 AM EST) every single day
    - cron: '0 10 * * *'
  # Allows you to click a button in GitHub to run it manually for testing
  workflow_dispatch: 

jobs:
  update-data-and-predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn kaggle requests joblib nba_api
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Download Latest Kaggle CSVs
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          kaggle datasets download -d eoinamoore/historical-nba-data-and-player-box-scores --unzip -o
          
          mkdir -p backend/data/box_scores
          mkdir -p backend/archive/box_scores
          
          cp *.csv backend/data/box_scores/
          cp *.csv backend/archive/box_scores/

      - name: Create API Config File
        working-directory: ./backend
        run: |
          echo "ODDS_API_KEY = '${{ secrets.ODDS_API_KEY }}'" > config_odds.py

      - name: Run Prediction Scripts
        working-directory: ./backend
        run: |
          python update_history.py
          python model_train.py
          python model_train_players.py
          python daily_update.py
          python daily_player_props.py

      - name: Commit and Push Updated Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated ML Pipeline: Updated daily JSON predictions"
          # Only committing  JSONs
          file_pattern: "**/*.json"
